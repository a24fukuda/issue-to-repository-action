name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun test
      - run: bun run build

      - name: Verify dist/ is up to date
        run: |
          if [ -n "$(git status --porcelain dist)" ]; then
            echo "dist/ is out of date. Run 'bun run build' and commit the result." >&2
            # `git diff` は未追跡ファイル（新しく生成されたsourcemap等）
            # には何も出力しないため、その失敗パターンでは診断が空になって
            # しまう。`git status --short` は未追跡・変更済みトラック済み
            # ファイルの両方をカバーする。
            git status --short dist
            git diff dist
            exit 1
          fi

      # action.ymlは `runs.using: node20` を宣言しているが、Bunの
      # バンドラーは、esbuildの古い --target=node20 のように構文を
      # 特定のNodeバージョン向けにダウンレベル変換することはない。
      # `node --check` は実際のNode 20環境下でdist/index.jsを
      # （実行せずに）パースするため、非互換な構文機能があれば、実際の
      # 実行時にのみ表面化するのではなく、CIで直接失敗するようになる。
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Verify dist/index.js parses under Node 20
        run: node --check dist/index.js
