name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun test
      - run: bun run build

      - name: Verify dist/ is up to date
        run: |
          if [ -n "$(git status --porcelain dist)" ]; then
            echo "dist/ is out of date. Run 'bun run build' and commit the result." >&2
            git diff dist
            exit 1
          fi
