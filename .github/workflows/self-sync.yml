name: Sync this repo's own issues

on:
  workflow_dispatch:
  push:
    branches: [main]
  # 日次スケジュールは無効化している。イベントトリガー（下の issues /
  # issue_comment）が実際にイシューを触ったときだけ発火して issues/ を
  # 最新化するため、このリポジトリの利用頻度では定期実行は不要と判断した。
  # 取りこぼしの拾い直しや強制的な全再同期が必要になったときは、上の
  # workflow_dispatch から手動実行できる。定期実行に戻したい場合は次の
  # 2行のコメントを外す（cron は UTC。"0 0 * * *" = 毎日 / 週次にするなら
  # 例えば "0 0 * * 0" = 毎週日曜 0:00 UTC）:
  # schedule:
  #   - cron: "0 0 * * *"
  issues:
    types:
      [
        opened,
        edited,
        closed,
        reopened,
        deleted,
        labeled,
        unlabeled,
        assigned,
        unassigned,
        milestoned,
        demilestoned,
      ]
  issue_comment:
    types: [created, edited, deleted]

permissions:
  contents: write
  issues: read

concurrency:
  group: issue-sync-${{ github.repository }}
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # sync.ymlと同じ理由でブランチ名を明示する — concurrencyで
          # 待機した実行が古いSHAをチェックアウトして自分自身の前回
          # コミットと衝突するのを防ぐ。
          ref: ${{ github.ref_name }}

      # 意図的に（利用者向けに「推奨」と文書化されている経路である
      # sync.ymlではなく）パッケージ化されたアクションを直接呼び出し、
      # 常に現在のコミットのdist/index.jsをドッグフーディングしている。
      # sync.ymlの自身のステップは内部で不変のリリース済みタグ
      # （`a24fukuda/issue-to-repository-action@vX.Y.Z`）を固定して参照して
      # いるため、ここでそれを経由すると、このコミットではなく固定された
      # リリースをテストすることになってしまう。つまり、sync.yml自体のYAML配線
      # （permissions/secrets/outputsの伝播）はこのワークフローでは
      # 検証されて**いない** — sync.ymlを編集した後は手動で確認すること。
      - uses: ./
        with:
          issues-dir: issues
