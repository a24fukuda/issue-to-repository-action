name: Sync this repo's own issues

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 0 * * *"
  issues:
    types:
      [
        opened,
        edited,
        closed,
        reopened,
        deleted,
        labeled,
        unlabeled,
        assigned,
        unassigned,
        milestoned,
        demilestoned,
      ]
  issue_comment:
    types: [created, edited, deleted]

permissions:
  contents: write
  issues: read

concurrency:
  group: issue-sync-${{ github.repository }}
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # sync.ymlと同じ理由でブランチ名を明示する — concurrencyで
          # 待機した実行が古いSHAをチェックアウトして自分自身の前回
          # コミットと衝突するのを防ぐ。
          ref: ${{ github.ref_name }}

      # 意図的に（利用者向けに「推奨」と文書化されている経路である
      # sync.ymlではなく）パッケージ化されたアクションを直接呼び出し、
      # 常に現在のコミットのdist/index.jsをドッグフーディングしている。
      # sync.ymlの自身のステップは内部で不変のリリース済みタグである
      # `a24fukuda/issue-to-repository-action@v1` を固定して参照して
      # いるため、ここでそれを経由すると、(a) このコミットではなく
      # 先週のリリースをテストすることになり、(b) v1が存在しない
      # うちは完全に失敗してしまう。つまり、sync.yml自体のYAML配線
      # （permissions/secrets/outputsの伝播）はこのワークフローでは
      # 検証されて**いない** — sync.ymlを編集した後は手動で確認すること。
      - uses: ./
        with:
          issues-dir: issues
