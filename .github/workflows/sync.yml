name: Sync Issues (reusable)

on:
  workflow_call:
    inputs:
      issues-dir:
        description: "Directory (relative to the repository root) where issue files are written."
        type: string
        default: "issues"
      commit-message:
        description: "Commit message used when issue files change."
        type: string
        default: "chore: sync issues"
      committer-name:
        description: "Name used for the sync commit."
        type: string
        default: "github-actions[bot]"
      committer-email:
        description: "Email used for the sync commit."
        type: string
        default: "41898282+github-actions[bot]@users.noreply.github.com"
    secrets:
      github-token:
        description: "Token used to read issues/comments and push commits. Defaults to the caller's GITHUB_TOKEN."
        required: false
    outputs:
      changed:
        description: "Whether a sync commit was pushed — issue files changed, or (on the first run against a pre-existing directory) internal tracking metadata needed to be established."
        value: ${{ jobs.sync.outputs.changed }}
      commit-sha:
        description: "SHA of the sync commit, if one was created."
        value: ${{ jobs.sync.outputs.commit-sha }}

permissions:
  contents: write
  issues: read

jobs:
  sync:
    runs-on: ubuntu-latest
    concurrency:
      group: issue-sync-${{ github.repository }}
      cancel-in-progress: false
    outputs:
      changed: ${{ steps.sync-issues.outputs.changed }}
      commit-sha: ${{ steps.sync-issues.outputs.commit-sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.github-token || github.token }}
          # refをブランチ名で明示的に指定する: 省略した場合の既定は
          # イベント発火時点で固定されたSHAをチェックアウトするため、
          # concurrencyグループで待機してから開始した実行が、直前の
          # sync実行が既にpushしたコミットより古いスナップショットを
          # チェックアウトしてしまい、その後のrebaseリトライが自分自身の
          # 前回コミットと本物のコンテンツ競合を起こして失敗し得る。
          # ブランチ名を指定すると、実行開始時点のブランチ最新tipを取得する。
          ref: ${{ github.ref_name }}

      - id: sync-issues
        uses: a24fukuda/issue-to-repository-action@v1.1.0
        with:
          github-token: ${{ secrets.github-token || github.token }}
          issues-dir: ${{ inputs.issues-dir }}
          commit-message: ${{ inputs.commit-message }}
          committer-name: ${{ inputs.committer-name }}
          committer-email: ${{ inputs.committer-email }}
